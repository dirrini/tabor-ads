services:
  db:
    image: mysql:8.0
    container_name: it_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-impression_track}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./data:/var/lib/mysql
    networks: [tracking_network]

  backend:
    build: ./api
    container_name: it_backend
    restart: unless-stopped
    env_file: [.env]
    environment:
      APP_KEY: ${APP_KEY:-base64:bG9jYWwtZGV2LWtleS0zMi1ieXRlcy1sb25nISEhISE=}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_NAME:-impression_track}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      BROADCAST_CONNECTION: reverb
      LOG_CHANNEL: stderr
      REVERB_HOST: reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_APP_ID: ${REVERB_APP_ID:-impression-track}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-local-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-local-secret}
    depends_on: [db]
    networks: [tracking_network]

  webserver:
    image: nginx:alpine
    container_name: it_webserver
    restart: unless-stopped
    ports: ["127.0.0.1:8080:80"]
    volumes:
      - ./api:/var/www/html
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [backend]
    networks: [tracking_network]

  reverb:
    build: ./api
    container_name: it_reverb
    restart: unless-stopped
    env_file: [.env]
    environment:
      APP_KEY: ${APP_KEY:-base64:bG9jYWwtZGV2LWtleS0zMi1ieXRlcy1sb25nISEhISE=}
      LOG_CHANNEL: stderr
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_DATABASE: ${DB_NAME:-impression_track}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REVERB_APP_ID: ${REVERB_APP_ID:-impression-track}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-local-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-local-secret}
      REVERB_HOST: localhost
      REVERB_PORT: 80
      REVERB_SCHEME: http
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    depends_on: [backend]
    networks: [tracking_network]

  frontend:
    build: ./frontend
    container_name: it_frontend
    restart: unless-stopped
    ports: ["127.0.0.1:3000:80"]
    depends_on: [webserver, reverb]
    networks: [tracking_network]

networks:
  tracking_network:
    driver: bridge
