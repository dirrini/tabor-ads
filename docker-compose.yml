services:
  db:
    image: mysql:8.0
    container_name: it_db
    restart: always
    environment:
      MYSQL_DATABASE: impression_track
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      # ❌ REMOVED port "3306:3306" exposure to the public internet
    volumes:
      # Keep the migration seeds and persistent data blocks mapped safely on the cloud host
      - ./database/migrations:/docker-entrypoint-initdb.d
      - ./data:/var/lib/mysql
    networks:
      - tracking_network

  backend:
    build: ./backend
    container_name: it_backend
    restart: always
    networks:
      - tracking_network
    depends_on:
      - db

  webserver:
    image: nginx:alpine
    container_name: it_webserver
    restart: always
    ports:
      - "127.0.0.1:8080:80" # 🔒 Locked down to accept traffic ONLY from local host Nginx proxy
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - tracking_network
    depends_on:
      - backend

  ws_server:
    build: ./ws-server
    container_name: it_ws_server
    restart: always
    ports:
      - "127.0.0.1:8085:8085" # 🔒 Locked down to accept traffic ONLY from local host Nginx proxy
    networks:
      - tracking_network

  frontend:
    build: ./frontend
    container_name: it_frontend
    restart: always
    ports:
      - "127.0.0.1:3000:80" # 🔒 Locked down to accept traffic ONLY from local host Nginx proxy
    networks:
      - tracking_network
    depends_on:
      - ws_server

networks:
  tracking_network:
    driver: bridge