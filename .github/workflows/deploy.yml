name: Deploy to OCI Production

on:
  workflow_run:
    workflows: [Continuous Integration]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy validated revision
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_SERVER_IP }}
          username: ${{ secrets.OCI_SERVER_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: 22
          command_timeout: 45m
          script: |
            set -euo pipefail

            APP_DIR="$HOME/impression-track"
            DEPLOY_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
            REPOSITORY="https://github.com/${{ github.repository }}.git"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ ! -d .git ]; then
              git init
              git remote add origin "$REPOSITORY"
            fi

            PREVIOUS_STABLE_COMMIT="$(git rev-parse HEAD 2>/dev/null || true)"

            git fetch --prune origin main
            git reset --hard "$DEPLOY_SHA"

            if [ ! -f .env ]; then
              echo "Missing $APP_DIR/.env. Create it from .env.example before deploying."
              exit 1
            fi

            sudo docker compose config --quiet
            sudo docker compose up -d --build --remove-orphans

            HEALTH_PASSED=false
            for attempt in $(seq 1 18); do
              if curl --fail --silent --show-error http://127.0.0.1:8080/up >/dev/null; then
                HEALTH_PASSED=true
                echo "Health check passed."
                break
              fi

              echo "Health check attempt $attempt failed; retrying in 5 seconds."
              sleep 5
            done

            if [ "$HEALTH_PASSED" = false ]; then
              echo "Deployment health check failed."

              if [ -n "$PREVIOUS_STABLE_COMMIT" ]; then
                echo "Rolling back to $PREVIOUS_STABLE_COMMIT."
                git reset --hard "$PREVIOUS_STABLE_COMMIT"
                sudo docker compose up -d --build --remove-orphans
              fi

              exit 1
            fi
