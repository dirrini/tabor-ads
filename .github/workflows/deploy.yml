name: Continuous Deployment to OCI Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      # 1. Compile the frontend securely in the GitHub Cloud
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Clean install and build your frontend assets
      - name: Build Frontend Production Assets
        run: |
          cd frontend
          npm ci
          npm run build

      # 2. Push the compiled "dist" folder to your OCI server via SSH
      - name: Copy Dist Folder to OCI Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_SERVER_IP }}
          username: ${{ secrets.OCI_SERVER_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: 22
          source: "frontend/dist/"
          target: "~/impression-track/"

      # 3. Handle the remote Git synchronization and Docker build
      - name: Execute Remote SSH Deployment Script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_SERVER_IP }}
          username: ${{ secrets.OCI_SERVER_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: 22
          script_stop: true
          debug: true
          script: |
            set -x
            # Ensure the root directory exists
            mkdir -p ~/impression-track
            cd ~/impression-track

            if [ -d ".git" ]
            then
              echo "Git repository detected"
              git remote set-url origin https://github.com/${{ github.repository }}.git
            else
              echo "Initializing repository"
              git init
              git remote add origin https://github.com/${{ github.repository }}.git
            fi

            # Pull down the metadata explicitly from upstream main
            git fetch origin main

            # Force synchronization of the files onto the server disk
            git reset --hard origin/main

            # Spin down existing container infrastructure safely
            sudo docker compose down --remove-orphans || true
            
            # Rebuild and run the immutable containers from the fresh files
            sudo docker compose up -d --build