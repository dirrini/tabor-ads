name: Continuous Deployment to OCI Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      # 🛠️ Step 1: Compile the frontend securely in the GitHub Cloud
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-dir: 'frontend'
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend Production Assets
        run: |
          cd frontend
          npm ci
          npm run build

      # 🛠️ Step 2: Push the compiled "dist" folder to your OCI server via SSH
      - name: Copy Dist Folder to OCI Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_SERVER_IP }}
          username: ${{ secrets.OCI_SERVER_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: 22
          source: "frontend/dist/"
          target: "~/impression-track/"

      # 🛠️ Step 3: Pull the backend code changes and spin up Docker
      - name: Execute Remote SSH Deployment Script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_SERVER_IP }}
          username: ${{ secrets.OCI_SERVER_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            mkdir -p ~/impression-track
            cd ~/impression-track

            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/${{ github.repository }}.git
            fi

            git fetch --all
            git reset --hard origin/main

            # Move the transferred dist folder to where the Dockerfile expects it
            mkdir -p frontend
            mv -f target/frontend/dist frontend/ || true

            sudo docker compose down --remove-orphans || true
            sudo docker compose up -d --build