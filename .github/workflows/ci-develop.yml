name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Laravel tests and style
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: curl, pcntl, pdo_mysql, pdo_sqlite, sqlite3
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/composer/files
          key: ${{ runner.os }}-composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install backend dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Check PHP formatting
        run: vendor/bin/pint --test

      - name: Run Laravel tests
        run: php artisan test --compact

  frontend:
    name: Vue production build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  containers:
    name: Docker Compose validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Create CI environment
        run: cp .env.example .env

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build application images
        run: docker compose build backend frontend
